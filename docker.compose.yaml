services:
  frontend:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    networks:
      - app-internal
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.vert-tige.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.vert-tige.entrypoints=websecure
      - traefik.http.routers.vert-tige.tls=true
      - traefik.http.routers.vert-tige.tls.certresolver=letsencrypt
      - traefik.http.services.vert-tige.loadbalancer.server.port=80

  backend:
    build: .
    restart: unless-stopped
    environment:
      VERT_TIGE_HOST: 0.0.0.0
      VERT_TIGE_PORT: 8000
      VERT_TIGE_PUBLIC_URL: https://${DOMAIN}
      VERT_TIGE_ADMIN_PASSWORD: ${VERT_TIGE_ADMIN_PASSWORD}
      VERT_TIGE_SECRET: ${VERT_TIGE_SECRET}
      VERT_TIGE_CONTACT_EMAIL: ${VERT_TIGE_CONTACT_EMAIL:-}
      VERT_TIGE_SMTP_HOST: ${VERT_TIGE_SMTP_HOST:-}
      VERT_TIGE_SMTP_PORT: ${VERT_TIGE_SMTP_PORT:-587}
      VERT_TIGE_SMTP_SECURITY: ${VERT_TIGE_SMTP_SECURITY:-starttls}
      VERT_TIGE_SMTP_USER: ${VERT_TIGE_SMTP_USER:-}
      VERT_TIGE_SMTP_PASSWORD: ${VERT_TIGE_SMTP_PASSWORD:-}
      VERT_TIGE_SMTP_FROM: ${VERT_TIGE_SMTP_FROM:-}
    volumes:
      - ./data:/app/data
      - ./static/uploads:/app/static/uploads
    networks:
      - app-internal

networks:
  app-internal:
  traefik-public:
    external: true
